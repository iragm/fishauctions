name: Docker images build and test
on:
  push:
  pull_request:
    branches: [master]

jobs:
  image-build:
    name: Test Images Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: ./.github/scripts/prepare-ci.sh
      - run: docker compose build

      - name: Run Django tests in parallel
        run: docker compose run --rm web python3 manage.py test --parallel auto

      - name: Print service logs on failure
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose ps -a || true
          echo "=== db logs ==="
          docker compose logs db || true
          echo "=== web logs ==="
          docker compose logs web || true

      - run: docker compose down
        if: always()
