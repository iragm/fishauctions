name: Docker images build and test
on:
  push:
  pull_request:
    branches: [master]

jobs:
  image-build:
    name: Test Images Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: ./.github/scripts/prepare-ci.sh
      - run: docker compose build
      - name: Start database and wait for health
        run: |
          docker compose up -d db
          echo "Waiting for database to be healthy (up to 240 seconds)..."
          for i in {1..80}; do  # 80 attempts × 3 seconds = 240 seconds max
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' db 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "healthy" ]; then
              echo "Database is healthy!"
              break
            fi
            echo "Database status: $STATUS (attempt $i/80)"
            sleep 3
          done
          # Check final status after waiting loop; fail explicitly if not healthy
          FINAL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' db 2>/dev/null || echo "not_found")
          if [ "$FINAL_STATUS" != "healthy" ]; then
            echo "Database failed to become healthy (final status: $FINAL_STATUS)."
            echo "Printing database container logs for diagnosis:"
            docker compose logs db || true
            exit 1
          fi
      - name: Start remaining services
        run: docker compose up --detach
      - name: Wait for web service to be ready
        run: |
          echo "Waiting for web service to be ready (up to 120 seconds)..."
          WEB_READY=0
          for i in {1..24}; do  # 24 attempts × 5 seconds = 120 seconds max
            if docker exec django python3 -c "import django; django.setup()" 2>/dev/null; then
              echo "Web service is ready"
              WEB_READY=1
              break
            fi
            echo "Waiting for web service... ($i/24)"
            sleep 5
          done
          if [ "$WEB_READY" -ne 1 ]; then
            echo "Web service failed to become ready within the expected time."
            echo "=== docker compose ps ==="
            docker compose ps || true
            echo "=== docker compose logs web ==="
            docker compose logs web || true
            exit 1
          fi

      - run: docker compose exec web python3 manage.py test

      - name: Print web container logs
        run: docker compose logs web
        continue-on-error: true
      - run: docker compose down
