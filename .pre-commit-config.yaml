# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^auctions/static/(js/vendor|css/vendor|admin|autocomplete_light|bootstrap_datepicker_plus|django_extensions|django_htmx|django_tables2|el-pagination|summernote|location_field|markdownfield|webpush)/
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version. Keep in sync with `ruff` in requirements-test.txt.
  rev: v0.15.11
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
