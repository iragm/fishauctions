{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Edit {{ club.name }}{% endblock %}

{% block content %}
{{ form.media }}
<h3><i class="bi bi-gear"></i> Edit {{ club.name }}</h3>

{% crispy form %}

{% if can_edit_discord %}
<div hx-get="{% url 'club_discord_config' club.slug %}"
     hx-trigger="load"
     hx-target="this"
     hx-swap="innerHTML">
  <div class="text-muted small"><i class="bi bi-hourglass-split"></i> Loading Discord configuration…</div>
</div>
{% endif %}

<div id="modals-here"></div>
{% endblock %}
