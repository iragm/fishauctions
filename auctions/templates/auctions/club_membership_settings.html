{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Membership Settings &mdash; {{ club.name }}{% endblock %}

{% block extra_js %}
<script type="text/javascript">
$(document).ready(function() {
    function togglePaymentFields() {
        const integrated = document.getElementById('id_allow_integrated_payments');
        const paymentUser = document.getElementById('div_id_payment_user');
        const reminders = document.getElementById('div_id_send_membership_expiration_reminders');
        if (!integrated) return;
        const show = integrated.checked;
        if (paymentUser) paymentUser.style.display = show ? '' : 'none';
        if (reminders) reminders.style.display = show ? '' : 'none';
        toggleContactEmail();
    }

    function toggleContactEmail() {
        const remindersToggle = document.getElementById('id_send_membership_expiration_reminders');
        const contactEmailField = document.getElementById('div_id_contact_email');
        if (!remindersToggle || !contactEmailField) return;
        contactEmailField.style.display = remindersToggle.checked ? '' : 'none';
    }

    togglePaymentFields();
    $('#id_allow_integrated_payments').on('change', togglePaymentFields);
    $('#id_send_membership_expiration_reminders').on('change', toggleContactEmail);
});
</script>
{% endblock %}

{% block content %}
{{ form.media }}
{% include "club_ribbon.html" %}

{% crispy form %}

<div id="modals-here"></div>
{% endblock %}
