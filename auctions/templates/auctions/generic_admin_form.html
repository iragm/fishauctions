{% load static %}
{{ form.media }}
{% load crispy_forms_tags %}
<div id="modal-backdrop" class="modal-backdrop fade show" style="display:block;"></div>
<div id="modal" class="modal fade show" tabindex="-1" style="display:block;">
	<div class="modal-dialog modal-lg modal-dialog-centered">
	  <div class="modal-content">
		<div class="modal-header">
		  <h5 class="modal-title">{{ modal_title | safe }}</h5> {{ top_buttons }}
		</div>
		{% if unsold_lot_warning %}<div class="modal-header"><span class='text-warning'>{{ unsold_lot_warning }}</span></div>{% endif %}
		<div class="modal-body">
            <span class="">{{ tooltip|safe }}</span>
			<p>{% crispy form form.helper %}</p>
	  </div>
	</div>
  </div>
</div>
<script>
(function() {
	function closeModal() {
		var container = document.getElementById("modals-here");
		var backdrop = document.getElementById("modal-backdrop");
		var modal = document.getElementById("modal");
		if (backdrop) { backdrop.classList.remove("show"); backdrop.style.pointerEvents = "none"; }
		if (modal) { modal.classList.remove("show"); modal.style.pointerEvents = "none"; }
		document.removeEventListener("keydown", escHandler);
		setTimeout(function() { if (container) container.innerHTML = ""; }, 300);
	}
	window.closeModal = closeModal;
	function escHandler(e) { if (e.key === "Escape") closeModal(); }
	document.addEventListener("keydown", escHandler);
	var bd = document.getElementById("modal-backdrop");
	if (bd) bd.addEventListener("click", closeModal);
})();
</script>
<script>
(function tryInit(retries) {
    // Wait for DAL (yl) and select2 (jQuery.fn.select2) to be available from form.media async scripts
    if (typeof yl === 'undefined' || typeof jQuery === 'undefined' || !jQuery.fn.select2) {
        if (retries > 0) setTimeout(function() { tryInit(retries - 1); }, 100);
        return;
    }
    // Trigger DAL's load-time initialization if it hasn't run yet
    if (!window.__dal__initialize) {
        window.dispatchEvent(new Event('load'));
    }
    // Initialize DAL widgets and any plain select2 multiselects in this modal
    setTimeout(function() {
        var $ = (window.django && django.jQuery) || jQuery;
        $('[data-autocomplete-light-function=select2]').not('.select2-hidden-accessible').each(function() {
            if (window.__dal__initialize) { window.__dal__initialize(this); }
            else if (yl.functions && yl.functions.select2) { yl.functions.select2($, this); }
        });
        $.fn.select2 && $('.js-services-multiselect').not('.select2-hidden-accessible').select2();
    }, 50);
})(30);
</script>
{{ extra_script }}
