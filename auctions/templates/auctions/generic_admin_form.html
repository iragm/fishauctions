{% load static %}
<script src="{% static 'js/vendor/jquery.min.js' %}"></script>
{{ form.media }}
{% load crispy_forms_tags %}
<div id="modal-backdrop" class="modal-backdrop fade show" style="display:block;"></div>
<div id="modal" class="modal fade show" tabindex="-1" style="display:block;">
	<div class="modal-dialog modal-lg modal-dialog-centered">
	  <div class="modal-content">
		<div class="modal-header">
		  <h5 class="modal-title">{{ modal_title | safe }}</h5> {{ top_buttons }}
		</div>
		{% if unsold_lot_warning %}<div class="modal-header"><span class='text-warning'>{{ unsold_lot_warning }}</span></div>{% endif %}
		<div class="modal-body">
            <span class="">{{ tooltip|safe }}</span>
			<p>{% crispy form form.helper %}</p>
	  </div>
	</div>
  </div>
</div>
<script>
(function() {
	function closeModal() {
		var container = document.getElementById("modals-here");
		var backdrop = document.getElementById("modal-backdrop");
		var modal = document.getElementById("modal");
		if (backdrop) { backdrop.classList.remove("show"); backdrop.style.pointerEvents = "none"; }
		if (modal) { modal.classList.remove("show"); modal.style.pointerEvents = "none"; }
		document.removeEventListener("keydown", escHandler);
		setTimeout(function() { if (container) container.innerHTML = ""; }, 300);
	}
	window.closeModal = closeModal;
	function escHandler(e) { if (e.key === "Escape") closeModal(); }
	document.addEventListener("keydown", escHandler);
	var bd = document.getElementById("modal-backdrop");
	if (bd) bd.addEventListener("click", closeModal);
})();
</script>
<script>
htmx.on("htmx:afterSettle", (e) => {
    setTimeout(() => {
        if (typeof dal_init === 'undefined') {
            window.dispatchEvent(new Event('load'));
            $('.js-services-multiselect').select2();
            dal_init = true;
        }
    }, 200);
});
</script>
