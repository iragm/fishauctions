{% extends "base.html" %}
{% block title %}{{ heading }} &mdash; {{ club.name }}{% endblock %}
{% block content %}
<div class="container" style="max-width: 640px;">
  <div class="card mt-4">
    <div class="card-body text-center">
      <h3 class="mb-3">{{ heading }}</h3>
      <p>{{ body }}</p>
      <a href="{% url 'club_detail' club.slug %}" class="btn btn-primary mt-2">{{ club.name }}</a>
    </div>
  </div>
</div>
{% endblock %}
