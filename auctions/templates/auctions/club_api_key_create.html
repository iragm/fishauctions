{% extends "base.html" %}
{% block title %}Create API Key &mdash; {{ club.name }}{% endblock %}

{% block content %}
<h3><i class="bi bi-key"></i> {{ club.name }} &mdash; Create API Key</h3>

<div class="mb-3">
  <a href="{% url 'club_api_keys' club.slug %}" class="btn btn-sm btn-secondary"><i class="bi bi-arrow-left"></i> Back to API keys</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" style="max-width:480px">
  {% csrf_token %}
  <div class="mb-3">
    <label for="id_name" class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="id_name" name="name" placeholder="e.g. WordPress, Google Forms" required maxlength="100" value="{{ form_values.name }}">
    <div class="form-text">A label to identify this integration.</div>
  </div>
  <div class="mb-3">
    <div class="form-label fw-semibold">Permissions</div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="id_can_add_club_members" name="can_add_club_members" {% if form_values.can_add_club_members %}checked{% endif %}>
      <label class="form-check-label" for="id_can_add_club_members">Can add club members</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="id_can_read_club_member_list" name="can_read_club_member_list" {% if form_values.can_read_club_member_list %}checked{% endif %}>
      <label class="form-check-label" for="id_can_read_club_member_list">Can read club member list</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="id_can_update_club_members" name="can_update_club_members" {% if form_values.can_update_club_members %}checked{% endif %}>
      <label class="form-check-label" for="id_can_update_club_members">Can update club members</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="id_can_add_bap_points" name="can_add_bap_points" {% if form_values.can_add_bap_points %}checked{% endif %}>
      <label class="form-check-label" for="id_can_add_bap_points">Can add BAP points</label>
    </div>
  </div>
<button type="submit" class="btn btn-success"><i class="bi bi-plus-lg"></i> Create key</button>
</form>
{% endblock %}
