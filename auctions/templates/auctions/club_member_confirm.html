<div id="modal-backdrop" class="modal-backdrop fade show" style="display:block;"></div>
<div id="modal" class="modal fade show" tabindex="-1" style="display:block;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title }}</h5>
      </div>
      <div class="modal-body">
        <p>{{ body }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button id="confirm-action-btn" type="button" class="btn btn-danger"
          hx-post="{{ action_url }}"
          hx-swap="none">{{ confirm_button_label|default:"Confirm" }}</button>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  clearTimeout(window._modalCloseTimer);
  function closeModal() {
    var container = document.getElementById("modals-here");
    var backdrop = document.getElementById("modal-backdrop");
    var modal = document.getElementById("modal");
    if (backdrop) { backdrop.classList.remove("show"); backdrop.style.pointerEvents = "none"; }
    if (modal) { modal.classList.remove("show"); modal.style.pointerEvents = "none"; }
    document.removeEventListener("keydown", escHandler);
    window._modalCloseTimer = setTimeout(function() { if (container) container.innerHTML = ""; }, 300);
  }
  window.closeModal = closeModal;
  function escHandler(e) { if (e.key === "Escape") closeModal(); }
  document.addEventListener("keydown", escHandler);
  var bd = document.getElementById("modal-backdrop");
  if (bd) bd.addEventListener("click", closeModal);

  // Close the modal and refresh the table after the confirm request completes (HTMX 1.8 compatible).
  // hx-swap="none" keeps the button in the DOM so htmx:afterRequest fires correctly; we then
  // dispatch clubMemberListChanged ourselves so the table container reloads.
  var btn = document.getElementById("confirm-action-btn");
  if (btn) {
    btn.addEventListener("htmx:afterRequest", function(evt) {
      if (evt.detail.successful) {
        closeModal();
        document.body.dispatchEvent(new CustomEvent("clubMemberListChanged"));
      }
    });
  }
})();
</script>
