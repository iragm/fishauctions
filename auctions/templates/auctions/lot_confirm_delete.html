{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %} Delete lot {% endblock %}
{% load static %}
{% block content %}
            <form method="post">{% csrf_token %}
                <p>Are you sure you want to delete {{ object }}?</p>
                <input type="submit" class='btn btn-danger' value="Delete">
                <a href="{% if request.GET.next %}{{ request.GET.next }}{% else %}/lots/{{object.pk}}{% endif %}" class='btn btn-secondary'>Cancel</a>
            </form>
{% endblock %}
