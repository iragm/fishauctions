{% extends "auctions/htmx_table_view.html" %}
{% load render_table from django_tables2 %}

{% block title %}Awarded Points — {{ club.name }}{% endblock %}

{% block htmx_table_ribbon %}
  {% include "club_ribbon.html" %}
{% endblock %}

{% block htmx_table %}
<div id="awards-table-container"
     class="table-container"
     hx-get=""
     hx-trigger="bapAwardListChanged from:body"
     hx-swap="innerHTML">
  {% render_table table %}
</div>
{% endblock %}
