{# Club page header. Navigation now lives in the club sidebar (club_sidebar.html). #}
{% load thumbnail %}
<h3 class="d-flex align-items-center gap-2">
  {% if club.icon %}
  {% thumbnail club.icon "club_icon" as club_icon %}
  <img src="{{ club_icon.url }}" alt="" class="rounded" style="width: 2em; height: 2em; object-fit: cover;">
  {% endif %}
  <span>{{ club.name }}</span>
</h3>
