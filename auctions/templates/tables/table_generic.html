{% load render_table from django_tables2 %}
{% if no_results %}
<div class="table-container mt-2 mb-2">
    {{ no_results | safe }}
</div>
{% elif nearby_filter_auto_removed %}
<div class="table-container mt-2 mb-2">
    {% render_table table %}
</div>
<div id="nearby-filter-notice" hx-swap-oob="true">
<small class="text-muted">{{ nearby_filter_auto_removed }}</small>
</div>
{% else %}
{% render_table table %}
{% endif %}
